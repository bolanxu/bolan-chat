{% extends "admin/base.html" %}
{% block title %}Edit User{% endblock %}
{% block breadcrumb %}USERS / EDIT{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Edit User</h2>
    <div class="subtitle">// modifying: {{ user.username }}</div>
  </div>
  <a href="{{ url_for('admin.users') }}" class="btn">← Back</a>
</div>

<div class="card" style="max-width:480px">
  <div class="card-title">Account Details</div>
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" value="{{ user.username }}" required>
    </div>
    <div class="form-group">
      <label>New Password <span style="color:var(--dim)">(leave blank to keep current)</span></label>
      <input type="password" name="password" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="4195551234">
    </div>
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" name="is_admin" id="is_admin" {% if user.is_admin %}checked{% endif %}>
        <label for="is_admin">Admin access</label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
