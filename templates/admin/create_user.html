{% extends "admin/base.html" %}
{% block title %}Create User{% endblock %}
{% block breadcrumb %}USERS / CREATE{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Create User</h2>
    <div class="subtitle">// add a new account</div>
  </div>
  <a href="{{ url_for('admin.users') }}" class="btn">← Back</a>
</div>

<div class="card" style="max-width:480px">
  <div class="card-title">Account Details</div>
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Phone Number (10 digits)</label>
      <input type="tel" name="phone" placeholder="4195551234">
    </div>
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" name="is_admin" id="is_admin">
        <label for="is_admin">Grant admin access</label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Create User</button>
  </form>
</div>
{% endblock %}
