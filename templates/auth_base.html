<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Bolan Chat{% endblock %}</title>
<script>
  (function() {
    var t = localStorage.getItem('chat-theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  /* ── Modern Light (default) ── */
  :root {
    --bg:        #f0f2f5;
    --bg2:       #ffffff;
    --bg3:       #e4e6eb;
    --border:    #d8dadf;
    --border2:   #c4c9d4;
    --accent:    #0084ff;
    --accent2:   #006fd6;
    --glow:      rgba(0,132,255,0.12);
    --text:      #3c4043;
    --text-dim:  #8a8d91;
    --white:     #050505;
    --danger:    #e41e3f;
    --font-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* ── Modern Dark ── */
  [data-theme="modern-dark"] {
    --bg:        #1e1f22;
    --bg2:       #2b2d31;
    --bg3:       #383a40;
    --border:    #1e2023;
    --border2:   #4e5058;
    --accent:    #5865f2;
    --accent2:   #4752c4;
    --glow:      rgba(88,101,242,0.15);
    --text:      #dcddde;
    --text-dim:  #72767d;
    --white:     #ffffff;
    --danger:    #ed4245;
    --font-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-base);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .auth-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .auth-logo .tag {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .auth-logo h1 {
    font-family: var(--font-base);
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .auth-logo h1 span { color: var(--accent); }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }

  .auth-card h2 {
    font-family: var(--font-base);
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .auth-card .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  input[type=text],
  input[type=password],
  input[type=tel] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--white);
    padding: 11px 14px;
    border-radius: 10px;
    font-family: var(--font-base);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px var(--glow);
  }
  input::placeholder { color: var(--text-dim); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #ffffff;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-family: var(--font-base);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-submit:hover { background: var(--accent2); }
  .btn-submit:active { transform: scale(0.99); }

  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer a:hover { text-decoration: underline; }

  .flash-msg {
    background: rgba(228,30,63,0.08);
    border: 1px solid rgba(228,30,63,0.25);
    border-left: 3px solid var(--danger);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 18px;
  }

  .label-hint {
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0;
    position: relative;
  }
  .divider span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg2);
    padding: 0 10px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Theme toggle in corner */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 20px;
    font-family: var(--font-base);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
    outline: none;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="tag">Bolan Chat</div>
    <h1>Welcome<span>.</span></h1>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script>
  const toggle = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('chat-theme') || 'modern-light';
  document.documentElement.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'modern-dark' ? '☀ Light' : '🌙 Dark';

  toggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'modern-dark' ? 'modern-light' : 'modern-dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('chat-theme', next);
    toggle.textContent = next === 'modern-dark' ? '☀ Light' : '🌙 Dark';
  });
</script>
</body>
</html>
