{% extends "auth_base.html" %}
{% block title %}Sign Up — Bolan Chat{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Create Account</h2>
  <div class="subtitle">Register to get started</div>

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Phone Number <span class="label-hint">(10-digit US)</span></label>
      <input type="tel" name="phone" placeholder="1234567890" maxlength="14" required
             oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••••" autocomplete="new-password" required>
    </div>
    <button type="submit" class="btn-submit">Sign Up</button>
  </form>

  <div class="divider"><span>OR</span></div>
</div>

<div class="auth-footer">
  Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
</div>
{% endblock %}
